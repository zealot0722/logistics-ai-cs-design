<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" role="img">
<title>物流 AI 客服系統 — 端到端流程</title>
<desc>從 LINE 訊息進入、經 n8n、LLM 分類、八層決策，到三個出口、Supabase 紀錄與知識回流的端到端流程。</desc>
<style>
  .t { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 400; }
  .ts { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #444441; }
  .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text { fill: #2C2C2A; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text { fill: #042C53; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #26215C; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text { fill: #04342C; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #4A1B0C; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber text { fill: #412402; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="40" y="32">End-to-end flow · 端到端流程</text>
<text class="ts" x="40" y="50">LINE inbound → n8n orchestrator → LLM 分流 → human-in-the-loop → Supabase logging</text>

<g class="c-gray">
<rect x="40" y="84" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="106" text-anchor="middle" dominant-baseline="central">Customer message</text>
<text class="ts" x="120" y="124" text-anchor="middle" dominant-baseline="central">LINE inbound</text>
</g>

<g class="c-blue">
<rect x="260" y="84" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="106" text-anchor="middle" dominant-baseline="central">n8n orchestrator</text>
<text class="ts" x="340" y="124" text-anchor="middle" dominant-baseline="central">43 nodes · webhook</text>
</g>

<g class="c-blue">
<rect x="480" y="84" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="106" text-anchor="middle" dominant-baseline="central">Preprocess</text>
<text class="ts" x="560" y="124" text-anchor="middle" dominant-baseline="central">追蹤碼 · 上下文聚合</text>
</g>

<line x1="200" y1="112" x2="252" y2="112" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="112" x2="472" y2="112" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="260" y="184" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="206" text-anchor="middle" dominant-baseline="central">LLM classification</text>
<text class="ts" x="340" y="224" text-anchor="middle" dominant-baseline="central">Groq llama-3.3-70b</text>
</g>

<path d="M 560 140 L 560 184 L 422 212" class="arr" fill="none" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="260" y="280" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="302" text-anchor="middle" dominant-baseline="central">8-layer decision</text>
<text class="ts" x="340" y="320" text-anchor="middle" dominant-baseline="central">confidence · tone · count</text>
</g>

<line x1="340" y1="240" x2="340" y2="272" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="380" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="402" text-anchor="middle" dominant-baseline="central">Auto reply</text>
<text class="ts" x="130" y="420" text-anchor="middle" dominant-baseline="central">高信心 · 低風險</text>
</g>

<g class="c-coral">
<rect x="240" y="380" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="402" text-anchor="middle" dominant-baseline="central">Human handoff</text>
<text class="ts" x="340" y="420" text-anchor="middle" dominant-baseline="central">低信心 · 合約 · 嚴重客訴</text>
</g>

<g class="c-amber">
<rect x="460" y="380" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="402" text-anchor="middle" dominant-baseline="central">Urgent escalation</text>
<text class="ts" x="550" y="420" text-anchor="middle" dominant-baseline="central">contact ≥ 3 · angry</text>
</g>

<path d="M 340 336 L 340 360 L 130 360 L 130 372" class="arr" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="336" x2="340" y2="372" class="arr" marker-end="url(#arrow)"/>
<path d="M 340 336 L 340 360 L 550 360 L 550 372" class="arr" fill="none" marker-end="url(#arrow)"/>

<g class="c-blue">
<rect x="180" y="478" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="500" text-anchor="middle" dominant-baseline="central">Supabase decision logging</text>
<text class="ts" x="340" y="518" text-anchor="middle" dominant-baseline="central">tone · confidence · contact_count · exit</text>
</g>

<path d="M 130 436 L 130 506 L 172 506" class="arr" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="436" x2="340" y2="470" class="arr" marker-end="url(#arrow)"/>
<path d="M 550 436 L 550 506 L 508 506" class="arr" fill="none" marker-end="url(#arrow)"/>

<path d="M 180 506 L 50 506 L 50 112" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="56" y="556">Knowledge feedback loop</text>
<text class="ts" x="56" y="572">人工處理過的訊息匯整成 training samples</text>
<text class="ts" x="56" y="588">回饋至 prompt 與分類規則優化</text>
</svg>
