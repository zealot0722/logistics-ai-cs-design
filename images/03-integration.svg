<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" role="img">
<title>物流客服 n8n 整合架構</title>
<desc>n8n 作為中央 orchestrator，連接 LINE、Groq、內部物流系統、Supabase、前端管理介面五個整合點。</desc>
<style>
  .ts { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #444441; }
  .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text { fill: #042C53; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #26215C; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text { fill: #04342C; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #4A1B0C; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber text { fill: #412402; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="40" y="32">Integration architecture · n8n as central orchestrator</text>
<text class="ts" x="40" y="50">Cloudflared tunnel 對外曝露 · 5 個整合點 · 雙向 / 單向資料流</text>

<g class="c-purple">
<rect x="240" y="220" width="200" height="120" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="248" text-anchor="middle" dominant-baseline="central">n8n orchestrator</text>
<text class="ts" x="340" y="270" text-anchor="middle" dominant-baseline="central">v2.8.4 · self-hosted</text>
<text class="ts" x="340" y="288" text-anchor="middle" dominant-baseline="central">43 nodes · 5-layer logic</text>
<text class="ts" x="340" y="310" text-anchor="middle" dominant-baseline="central">Cloudflared tunnel</text>
<text class="ts" x="340" y="328" text-anchor="middle" dominant-baseline="central">Windows · port 5678</text>
</g>

<g class="c-teal">
<rect x="40" y="100" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="124" text-anchor="middle" dominant-baseline="central">LINE messaging API</text>
<text class="ts" x="125" y="142" text-anchor="middle" dominant-baseline="central">Webhook in</text>
<text class="ts" x="125" y="158" text-anchor="middle" dominant-baseline="central">Push API out</text>
</g>

<g class="c-teal">
<rect x="470" y="100" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="124" text-anchor="middle" dominant-baseline="central">Groq cloud</text>
<text class="ts" x="555" y="142" text-anchor="middle" dominant-baseline="central">llama-3.3-70b</text>
<text class="ts" x="555" y="158" text-anchor="middle" dominant-baseline="central">~0.5s latency</text>
</g>

<g class="c-blue">
<rect x="40" y="396" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="420" text-anchor="middle" dominant-baseline="central">Internal logistics system</text>
<text class="ts" x="125" y="438" text-anchor="middle" dominant-baseline="central">ASP.NET tracking</text>
<text class="ts" x="125" y="454" text-anchor="middle" dominant-baseline="central">Playwright scraper</text>
</g>

<g class="c-coral">
<rect x="470" y="396" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="420" text-anchor="middle" dominant-baseline="central">Supabase</text>
<text class="ts" x="555" y="438" text-anchor="middle" dominant-baseline="central">Postgres + REST</text>
<text class="ts" x="555" y="454" text-anchor="middle" dominant-baseline="central">Decision logging</text>
</g>

<g class="c-amber">
<rect x="240" y="496" width="200" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="520" text-anchor="middle" dominant-baseline="central">Frontend panels</text>
<text class="ts" x="340" y="538" text-anchor="middle" dominant-baseline="central">Agent · Manager</text>
<text class="ts" x="340" y="554" text-anchor="middle" dominant-baseline="central">HTML + Supabase JS</text>
</g>

<line x1="210" y1="148" x2="252" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="240" y1="240" x2="200" y2="158" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="218" y="200">webhook · push</text>

<line x1="470" y1="148" x2="428" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="240" x2="480" y2="158" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="446" y="200">prompt · JSON</text>

<line x1="210" y1="412" x2="252" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="240" y1="320" x2="200" y2="402" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="190" y="370">query · response</text>

<line x1="470" y1="412" x2="428" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="320" x2="480" y2="402" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="450" y="370">insert · select</text>

<line x1="340" y1="340" x2="340" y2="488" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
<text class="ts" x="350" y="420">trigger only</text>

<path d="M 470 432 Q 450 528 440 528" class="arr" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="448" y="475">read</text>
</svg>
